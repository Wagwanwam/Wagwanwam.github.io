<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="N3 語彙">
<title>N3 語彙 — Luyện từ vựng N3</title>
<style>
:root{
  --bg:#0f172a; --bg2:#1e293b; --card:#1e293b; --card2:#283549;
  --line:#334155; --txt:#e2e8f0; --mut:#94a3b8; --acc:#38bdf8; --acc2:#0ea5e9;
  --good:#22c55e; --bad:#ef4444; --warn:#f59e0b; --gold:#fbbf24;
  --rad:16px; --maxw:1100px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:linear-gradient(180deg,#0b1222,#0f172a 30%);color:var(--txt);
  font-family:'Segoe UI',system-ui,'Yu Gothic','Hiragino Sans','Noto Sans JP',sans-serif;
  min-height:100vh;font-size:16px;line-height:1.5;
}
.wrap{max-width:var(--maxw);margin:0 auto;padding:14px 14px 96px}
/* ----- device modes ----- */
body.mode-phone .wrap{max-width:480px}
body.mode-desktop .wrap{max-width:1100px}
h1,h2,h3{margin:0 0 10px}
ruby rt{font-size:.55em;color:var(--acc);font-weight:600;user-select:none}
button{font-family:inherit;cursor:pointer;border:none;color:inherit}
.hide{display:none!important}
.mut{color:var(--mut)}
.center{text-align:center}

/* header */
header{position:sticky;top:0;z-index:20;background:rgba(15,23,42,.92);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line)}
.hd{max-width:var(--maxw);margin:0 auto;display:flex;align-items:center;gap:10px;padding:10px 14px}
.hd .logo{font-weight:800;font-size:18px;letter-spacing:.5px}
.hd .logo b{color:var(--acc)}
.hd .spacer{flex:1}
.modeSw{display:flex;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px}
.modeSw button{padding:6px 12px;border-radius:999px;font-size:13px;color:var(--mut);background:none}
.modeSw button.on{background:var(--acc);color:#06283d;font-weight:700}
.iconbtn{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 11px;font-size:15px}

/* cards / grid */
.grid{display:grid;gap:12px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
body.mode-phone .g3,body.mode-phone .g4{grid-template-columns:1fr 1fr}
@media(max-width:560px){.g3,.g4{grid-template-columns:1fr 1fr}}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--rad);padding:16px}
.card.pad0{padding:0;overflow:hidden}

/* stat tiles */
.stat{background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--line);
  border-radius:var(--rad);padding:14px}
.stat .n{font-size:26px;font-weight:800;color:var(--acc)}
.stat .l{font-size:12px;color:var(--mut);margin-top:2px}

/* big action buttons */
.actions{display:grid;gap:12px;grid-template-columns:1fr 1fr;margin-top:14px}
.act{display:flex;flex-direction:column;gap:4px;align-items:flex-start;text-align:left;
  background:linear-gradient(135deg,#1d2b45,#223352);border:1px solid var(--line);
  border-radius:var(--rad);padding:16px;transition:.15s}
.act:active{transform:scale(.98)}
.act .ic{font-size:24px}
.act .t{font-weight:700;font-size:16px}
.act .d{font-size:12px;color:var(--mut)}
.act.prime{background:linear-gradient(135deg,#0ea5e9,#0369a1);border-color:#0ea5e9}
.act.prime .d{color:#cce9fb}

/* progress bar */
.pbar{height:10px;background:var(--bg2);border-radius:999px;overflow:hidden}
.pbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--acc),var(--good));border-radius:999px}

/* lists */
.row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.row .badge{font-size:12px;padding:3px 8px;border-radius:999px;background:var(--bg2);color:var(--mut)}
.row:active{background:var(--card2)}
.chev{margin-left:auto;color:var(--mut)}

.btn{background:var(--acc);color:#06283d;font-weight:700;border-radius:12px;padding:12px 16px;font-size:15px}
.btn.sec{background:var(--card2);color:var(--txt);border:1px solid var(--line)}
.btn.ghost{background:none;border:1px solid var(--line);color:var(--txt)}
.btn.wide{display:block;width:100%;text-align:center}
.btnrow{display:flex;gap:10px;flex-wrap:wrap}

.pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
.pill.n{background:#1e3a5f;color:#7dd3fc}
.pill.v{background:#3b2f5e;color:#c4b5fd}
.pill.a{background:#14432f;color:#86efac}
.pill.adv{background:#4a3410;color:#fcd34d}
.pill.k{background:#4a1d2e;color:#fda4af}

/* flashcard */
.fcard{background:linear-gradient(160deg,#1b2942,#223457);border:1px solid var(--line);
  border-radius:24px;padding:34px 20px;text-align:center;min-height:260px;
  display:flex;flex-direction:column;justify-content:center;gap:14px}
.fcard .jp{font-size:46px;font-weight:800;line-height:1.25}
body.mode-phone .fcard .jp{font-size:40px}
.fcard .read{font-size:20px;color:var(--acc)}
.fcard .vi{font-size:24px;font-weight:700}
.fcard .en{color:var(--mut);font-size:15px}
.tapHint{color:var(--mut);font-size:13px}

/* quiz */
.qbox{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:22px 18px}
.qprompt{text-align:center;margin:6px 0 18px}
.qprompt .jp{font-size:40px;font-weight:800;line-height:1.3}
body.mode-phone .qprompt .jp{font-size:34px}
.qprompt .sub{color:var(--mut);font-size:14px;margin-top:6px}
.opts{display:grid;gap:10px}
.opt{display:flex;align-items:center;gap:10px;text-align:left;background:var(--card2);
  border:1.5px solid var(--line);border-radius:14px;padding:14px 14px;font-size:16px;transition:.12s}
.opt .k{width:26px;height:26px;flex:0 0 26px;border-radius:8px;background:var(--bg2);
  display:grid;place-items:center;font-size:13px;color:var(--mut);font-weight:700}
.opt:active{transform:scale(.99)}
.opt.correct{border-color:var(--good);background:#10301f}
.opt.wrong{border-color:var(--bad);background:#341417}
.opt.dim{opacity:.5}
.qfoot{display:flex;align-items:center;gap:12px;margin-top:16px}
.qfoot .res{font-weight:700}
.qfoot .res.ok{color:var(--good)} .qfoot .res.no{color:var(--bad)}

/* progress dots / topbar in session */
.sessbar{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.sessbar .x{font-size:22px;color:var(--mut);background:none;padding:4px 8px}
.sess-pbar{flex:1}
.sessbar .cnt{font-size:13px;color:var(--mut);font-variant-numeric:tabular-nums}

/* result screen */
.scorebig{font-size:60px;font-weight:800;text-align:center}
.scorebig small{font-size:22px;color:var(--mut)}

/* bottom nav */
.bnav{position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(15,23,42,.96);
  border-top:1px solid var(--line);display:flex;backdrop-filter:blur(8px)}
.bnav button{flex:1;background:none;color:var(--mut);padding:9px 0 12px;font-size:11px;
  display:flex;flex-direction:column;align-items:center;gap:3px}
.bnav button .bi{font-size:20px}
.bnav button.on{color:var(--acc)}

/* history chart */
.chart{display:flex;align-items:flex-end;gap:6px;height:140px;padding:8px 4px 0}
.chart .bar{flex:1;display:flex;flex-direction:column;justify-content:flex-end;gap:4px;align-items:center}
.chart .bar i{display:block;width:100%;background:linear-gradient(180deg,var(--acc),var(--acc2));
  border-radius:6px 6px 0 0;min-height:3px}
.chart .bar small{font-size:9px;color:var(--mut)}

.seg{display:flex;gap:6px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:4px;flex-wrap:wrap}
.seg button{flex:1;padding:8px;border-radius:8px;background:none;color:var(--mut);font-size:13px;font-weight:600;min-width:70px}
.seg button.on{background:var(--acc);color:#06283d}

.toast{position:fixed;left:50%;bottom:78px;transform:translateX(-50%);background:#0b1626;
  border:1px solid var(--acc);color:var(--txt);padding:10px 16px;border-radius:12px;z-index:50;
  font-size:14px;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.lock{opacity:.45;pointer-events:none}
.tag{font-size:11px;color:var(--mut);background:var(--bg2);border-radius:6px;padding:2px 6px}
.kbd{font-size:11px;color:var(--mut);border:1px solid var(--line);border-radius:5px;padding:1px 5px}
.note{font-size:13px;color:var(--mut);background:#13203a;border:1px solid var(--line);border-radius:12px;padding:10px 12px}
</style>
</head>
<body>
<header>
  <div class="hd">
    <div class="logo">N3 <b>語彙</b></div>
    <div class="spacer"></div>
    <div class="modeSw" id="modeSw">
      <button data-m="phone">📱 ĐT</button>
      <button data-m="desktop">💻 PC</button>
    </div>
    <button class="iconbtn" id="furiBtn" title="Furigana">あ</button>
  </div>
</header>

<div class="wrap" id="app"></div>

<nav class="bnav" id="bnav">
  <button data-nav="home"><span class="bi">🏠</span>Trang chủ</button>
  <button data-nav="learn"><span class="bi">📖</span>Học</button>
  <button data-nav="tests"><span class="bi">📝</span>Bài test</button>
  <button data-nav="history"><span class="bi">📊</span>Lịch sử</button>
</nav>

<script src="data.js"></script>
<script src="jlpt.js"></script>
<script>
/* ================= STATE / STORAGE ================= */
const LS = {
  get(k,d){ try{return JSON.parse(localStorage.getItem(k)) ?? d}catch(e){return d} },
  set(k,v){ localStorage.setItem(k,JSON.stringify(v)) }
};
const S = {
  prog: LS.get('n3_progress',{}),     // id -> {box,seen,ok,no,due}
  time: LS.get('n3_time',{}),         // 'YYYY-MM-DD' -> seconds
  tests: LS.get('n3_tests',[]),       // [{date,type,label,score,total,pct}]
  set: LS.get('n3_settings',{mode:'auto',furigana:'all'})
};
function saveProg(){LS.set('n3_progress',S.prog)}
function saveTests(){LS.set('n3_tests',S.tests)}
function saveSet(){LS.set('n3_settings',S.set)}
const WORDS = (window.N3DATA&&N3DATA.words)||[];
const UNITS = (window.N3DATA&&N3DATA.units)||[];
const byId = {}; WORDS.forEach(w=>byId[w.i]=w);
function unitWords(u){return WORDS.filter(w=>w.u===u)}
function todayKey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}

/* ================= STUDY-TIME TRACKER ================= */
let lastActive = Date.now();
['click','keydown','touchstart','scroll','mousemove'].forEach(ev=>
  document.addEventListener(ev,()=>lastActive=Date.now(),{passive:true}));
let timeBuf=0;
setInterval(()=>{
  if(document.visibilityState!=='visible')return;
  if(Date.now()-lastActive>60000)return;       // idle >60s => pause
  const k=todayKey(); S.time[k]=(S.time[k]||0)+1; timeBuf++;
  if(timeBuf>=10){LS.set('n3_time',S.time);timeBuf=0; if(view==='home')paintHomeTime();}
},1000);
window.addEventListener('beforeunload',()=>LS.set('n3_time',S.time));
function fmtDur(sec){sec=Math.round(sec);const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s=sec%60;
  if(h)return h+'h'+String(m).padStart(2,'0');return m+'p'+(m<10?String(s).padStart(2,'0')+'s':'')}
function streak(){let n=0;const d=new Date();for(;;){const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  if((S.time[k]||0)>=60){n++;d.setDate(d.getDate()-1)}else break} return n}

/* ================= FURIGANA / HELPERS ================= */
const POSname={n:'Danh từ',v:'Động từ',a:'Tính từ',adv:'Phó từ',k:'Katakana'};
function hasKanji(s){return /[一-龯]/.test(s)}
function jp(w,force){
  const show = force || S.set.furigana==='all' || (S.set.furigana==='hard'&&w.hard);
  if(show && w.r && w.r!==w.w && hasKanji(w.w))
    return '<ruby>'+esc(w.w)+'<rt>'+esc(w.r)+'</rt></ruby>';
  return esc(w.w);
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]]}return a}
function sample(arr,n,exclude){const p=shuffle(arr.filter(x=>x!==exclude));return p.slice(0,n)}
function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),1700)}

/* SRS (Leitner) */
function rec(id){return S.prog[id]||(S.prog[id]={box:0,seen:0,ok:0,no:0})}
function markAnswer(id,correct){const r=rec(id);r.seen++;if(correct){r.ok++;r.box=Math.min(5,r.box+1)}else{r.no++;r.box=Math.max(0,r.box-1)}r.last=Date.now();saveProg()}
function learnedCount(){return Object.values(S.prog).filter(r=>r.box>=3).length}
function seenCount(){return Object.keys(S.prog).length}

/* ================= QUESTION GENERATION ================= */
// pool = array of words to draw distractors from (whole deck preferred)
function qJP2VI(w,pool){
  const ds=sample(pool.filter(x=>x.v!==w.v),3,w);
  const opts=shuffle([{t:w.v,ok:true},...ds.map(x=>({t:x.v,ok:false}))]);
  return {kind:'jp2vi',w,promptHTML:'<div class="jp">'+jp(w,true)+'</div><div class="sub">Chọn nghĩa tiếng Việt đúng</div>',opts};
}
function qVI2JP(w,pool){
  const ds=sample(pool.filter(x=>x.w!==w.w),3,w);
  const opts=shuffle([{t:jp(w,true)+' <span class="mut">('+esc(w.r)+')</span>',ok:true},
    ...ds.map(x=>({t:jp(x,true)+' <span class="mut">('+esc(x.r)+')</span>',ok:false}))]);
  return {kind:'vi2jp',w,promptHTML:'<div class="jp" style="font-size:26px">'+esc(w.v)+'</div><div class="sub">Chọn từ tiếng Nhật đúng</div>',opts};
}
function qReading(w,pool){
  const cand=pool.filter(x=>x.r!==w.r && hasKanji(x.w));
  const ds=sample(cand,3,w);
  if(ds.length<3)return qJP2VI(w,pool);
  const opts=shuffle([{t:w.r,ok:true},...ds.map(x=>({t:x.r,ok:false}))]);
  return {kind:'read',w,promptHTML:'<div class="jp">'+esc(w.w)+'</div><div class="sub">Cách đọc đúng là?</div>',opts};
}
// build a mixed list of questions from a set of words
function buildQuestions(words,opt){
  opt=opt||{};const pool=opt.pool||WORDS;
  const types=opt.types||['jp2vi','jp2vi','jp2vi','read','vi2jp']; // weighted, JP→VI dominant
  let list=shuffle(words);
  if(opt.limit)list=list.slice(0,opt.limit);
  return list.map(w=>{
    let t=types[Math.random()*types.length|0];
    if(t==='read'&&!hasKanji(w.w))t='jp2vi';
    return t==='read'?qReading(w,pool):t==='vi2jp'?qVI2JP(w,pool):qJP2VI(w,pool);
  });
}

/* ================= JLPT BANK ================= */
const JLPTLABEL={1:'問題1 · Đọc kanji (đọc đúng âm)',2:'問題2 · Chữ Hán (cách viết đúng)',
  3:'問題3 · Điền từ vào （　）',4:'問題4 · Nghĩa gần nhất',5:'問題5 · Câu dùng từ đúng'};
function jlptToQ(item,idx){
  let promptHTML;
  if(item.m===5)
    promptHTML='<div class="jp" style="font-size:30px">'+esc(item.q)+'</div><div class="sub">'+JLPTLABEL[5]+' — chọn câu DÙNG ĐÚNG</div>';
  else
    promptHTML='<div style="font-size:21px;line-height:1.7;font-weight:600">'+item.q+'</div><div class="sub">'+JLPTLABEL[item.m]+' · đề '+esc(item.ex)+'</div>';
  const opts=item.o.map((t,i)=>({t:esc(t),ok:i===item.a}));
  return {kind:'jlpt',w:{i:'j'+idx,r:'',w:item.q,v:item.o[item.a]},promptHTML,opts};
}
function startJLPT(mondai){
  let pool=(window.JLPT||[]);
  if(mondai)pool=pool.filter(x=>x.m===mondai);
  if(!pool.length)return toast('Chưa có câu hỏi JLPT.');
  const qs=shuffle(pool).map((it)=>jlptToQ(it,window.JLPT.indexOf(it)));
  startSession(qs,{title:mondai?('JLPT '+JLPTLABEL[mondai].split('·')[0].trim()):'Mô phỏng đề JLPT N3 (語彙)',mode:'test',type:'jlpt'});
}

/* ================= ROUTER ================= */
let view='home';
const app=document.getElementById('app');
function go(v,arg){view=v;window.scrollTo(0,0);
  document.querySelectorAll('#bnav button').forEach(b=>b.classList.toggle('on',b.dataset.nav===v));
  ({home:Home,learn:LearnHub,tests:TestHub,history:History}[v]||Home)(arg)}
document.querySelectorAll('#bnav button').forEach(b=>b.onclick=()=>go(b.dataset.nav));

/* ================= HOME ================= */
function Home(){
  const tot=WORDS.length, learned=learnedCount(), seen=seenCount();
  const pct=tot?Math.round(learned/835*100):0;
  app.innerHTML=`
   <div class="grid g3" style="margin-bottom:14px">
     <div class="stat"><div class="n" id="tToday">0p</div><div class="l">Hôm nay</div></div>
     <div class="stat"><div class="n">${streak()}🔥</div><div class="l">Chuỗi ngày</div></div>
     <div class="stat"><div class="n">${learned}</div><div class="l">Từ đã thuộc</div></div>
   </div>
   <div class="card" style="margin-bottom:14px">
     <div style="display:flex;justify-content:space-between;margin-bottom:8px">
       <b>Tiến độ học (${learned}/835)</b><span class="mut">${pct}%</span></div>
     <div class="pbar"><i style="width:${pct}%"></i></div>
     <div class="mut" style="font-size:13px;margin-top:8px">Đã có dữ liệu: <b>${tot}</b> từ · Đã gặp: <b>${seen}</b></div>
   </div>
   <h3>Bắt đầu học</h3>
   <div class="actions">
     <button class="act prime" onclick="go('learn')"><span class="ic">📖</span><span class="t">Học từ mới</span><span class="d">Flashcard + trắc nghiệm Nhật→Việt</span></button>
     <button class="act" onclick="quickQuiz()"><span class="ic">⚡</span><span class="t">Luyện nhanh 20 câu</span><span class="d">Trộn các từ đã học</span></button>
     <button class="act" onclick="reviewDue()"><span class="ic">🔁</span><span class="t">Ôn từ hay sai</span><span class="d">Tập trung từ chưa chắc</span></button>
     <button class="act" onclick="go('tests')"><span class="ic">📝</span><span class="t">Bài test</span><span class="d">Mỗi 50 từ · Unit · 2 Unit · Tổng hợp</span></button>
   </div>
   <div class="note" style="margin-top:16px">💡 Mẹo: bấm nút <b>あ</b> ở góc phải để bật/tắt furigana (hiragana trên kanji). Đổi <b>📱 ĐT / 💻 PC</b> cho vừa màn hình.</div>`;
  paintHomeTime();
}
function paintHomeTime(){const e=document.getElementById('tToday');if(e)e.textContent=fmtDur(S.time[todayKey()]||0)}
function quickQuiz(){const seen=WORDS.filter(w=>S.prog[w.i]);const base=seen.length>=8?seen:WORDS;
  startSession(buildQuestions(base,{limit:20}),{title:'Luyện nhanh',mode:'quiz'})}
function reviewDue(){const weak=WORDS.filter(w=>{const r=S.prog[w.i];return r&&(r.no>0||r.box<3)});
  if(weak.length<4)return toast('Chưa đủ dữ liệu — học thêm chút nhé!');
  startSession(buildQuestions(weak,{limit:Math.min(25,weak.length)}),{title:'Ôn từ hay sai',mode:'quiz'})}

/* ================= LEARN HUB (pick unit / block) ================= */
function LearnHub(){
  let html=`<h2>Chọn phần để học</h2>
   <p class="mut" style="margin-top:-4px">Học theo Unit hoặc theo nhóm 50 từ. Mỗi phần: lật thẻ → luyện trắc nghiệm.</p>`;
  html+='<div class="card pad0">';
  UNITS.forEach(u=>{
    const ws=unitWords(u.u);const has=ws.length>0;
    const done=ws.filter(w=>{const r=S.prog[w.i];return r&&r.box>=3}).length;
    html+=`<div class="row ${has?'':'lock'}" ${has?`onclick="unitMenu(${u.u})"`:''}>
      <div><div><b>Unit ${String(u.u).padStart(2,'0')}</b> · ${u.name}</div>
      <div class="mut" style="font-size:13px">${u.vi} · từ ${u.range[0]}–${u.range[1]}</div></div>
      <div style="margin-left:auto;text-align:right">
        <div class="badge">${has?done+'/'+ws.length:'sắp có'}</div></div>
      <span class="chev">›</span></div>`;
  });
  html+='</div>';
  app.innerHTML=html;
}
function unitMenu(u){
  const ws=unitWords(u);const info=UNITS.find(x=>x.u===u);
  // split into blocks of 50 by sequence
  const blocks=[];for(let k=0;k<ws.length;k+=50)blocks.push(ws.slice(k,k+50));
  let html=`<div class="sessbar"><button class="x" onclick="go('learn')">‹</button>
     <b>Unit ${String(u).padStart(2,'0')} · ${info.name}</b></div>
   <div class="btnrow" style="margin-bottom:14px">
     <button class="btn" onclick='startFlash(${JSON.stringify(ws.map(w=>w.i))})'>📖 Lật thẻ cả Unit</button>
     <button class="btn sec" onclick='startSession(buildQuestions(idsToWords(${JSON.stringify(ws.map(w=>w.i))}),{}),{title:"Unit ${u} – trắc nghiệm",mode:"quiz"})'>⚡ Trắc nghiệm cả Unit</button>
   </div>
   <h3>Học theo nhóm 50 từ</h3><div class="card pad0">`;
  blocks.forEach((b,k)=>{
    const a=b[0].i,z=b[b.length-1].i;
    const done=b.filter(w=>{const r=S.prog[w.i];return r&&r.box>=3}).length;
    html+=`<div class="row">
      <div><b>Nhóm ${k+1}</b><div class="mut" style="font-size:13px">từ ${a}–${z} (${b.length} từ)</div></div>
      <div class="badge" style="margin-left:auto">${done}/${b.length}</div>
      <button class="btn sec" style="padding:8px 12px" onclick='startFlash(${JSON.stringify(b.map(w=>w.i))})'>Lật thẻ</button>
      <button class="btn" style="padding:8px 12px" onclick='startSession(buildQuestions(idsToWords(${JSON.stringify(b.map(w=>w.i))}),{}),{title:"Nhóm ${a}–${z}",mode:"quiz"})'>Quiz</button>
    </div>`;
  });
  html+='</div>';
  // 50-word big test
  html+=`<h3 style="margin-top:16px">Bài test nhóm 50 từ</h3><div class="card pad0">`;
  blocks.forEach((b,k)=>{
    const a=b[0].i,z=b[b.length-1].i;
    html+=`<div class="row"><div><b>Test nhóm ${k+1}</b><div class="mut" style="font-size:13px">${b.length} câu · từ ${a}–${z}</div></div>
      <button class="btn" style="margin-left:auto" onclick='startTest("Test 50 từ ${a}–${z}","block",${JSON.stringify(b.map(w=>w.i))})'>Làm test ▶</button></div>`;
  });
  html+='</div>';
  app.innerHTML=html;
}
function idsToWords(ids){return ids.map(i=>byId[i]).filter(Boolean)}

/* ================= FLASHCARD ================= */
let fc={list:[],idx:0,revealed:false};
function startFlash(ids){fc={list:shuffle(idsToWords(ids)),idx:0,revealed:false};paintFlash()}
function paintFlash(){
  if(fc.idx>=fc.list.length)return flashDone();
  const w=fc.list[fc.idx];
  app.innerHTML=`<div class="sessbar"><button class="x" onclick="go('learn')">✕</button>
     <div class="sess-pbar pbar"><i style="width:${fc.idx/fc.list.length*100}%"></i></div>
     <span class="cnt">${fc.idx+1}/${fc.list.length}</span></div>
   <div class="fcard" onclick="flashReveal()">
     <span class="pill ${w.p}">${POSname[w.p]}</span>
     <div class="jp">${jp(w,true)}</div>
     <div class="read">${esc(w.r)}</div>
     ${fc.revealed?`<div class="vi">${esc(w.v)}</div><div class="en">${esc(w.e||'')}</div>`:'<div class="tapHint">Chạm để xem nghĩa</div>'}
   </div>
   <div class="btnrow" style="margin-top:16px">
     ${fc.revealed?`<button class="btn sec wide" style="flex:1" onclick="flashMark(false)">😕 Chưa thuộc</button>
       <button class="btn wide" style="flex:1" onclick="flashMark(true)">😎 Đã thuộc</button>`
      :`<button class="btn wide" onclick="flashReveal()">Xem nghĩa</button>`}
   </div>`;
}
function flashReveal(){fc.revealed=true;paintFlash()}
function flashMark(known){const w=fc.list[fc.idx];markAnswer(w.i,known);fc.idx++;fc.revealed=false;paintFlash()}
function flashDone(){
  app.innerHTML=`<div class="card center" style="padding:30px">
    <div style="font-size:46px">🎉</div><h2>Xong phần lật thẻ!</h2>
    <p class="mut">Bạn đã xem ${fc.list.length} từ. Giờ luyện trắc nghiệm để nhớ chắc hơn nhé.</p>
    <div class="btnrow" style="justify-content:center">
      <button class="btn" onclick='startSession(buildQuestions(${JSON.stringify(fc.list.map(w=>w.i))}.map(i=>byId[i]),{}),{title:"Trắc nghiệm",mode:"quiz"})'>⚡ Trắc nghiệm ngay</button>
      <button class="btn sec" onclick="go('learn')">Về danh sách</button>
    </div></div>`;
}

/* ================= QUIZ / TEST SESSION ================= */
let sess=null;
function startSession(questions,meta){
  if(!questions.length)return toast('Chưa có từ để luyện.');
  sess={q:questions,idx:0,score:0,answered:false,meta:meta||{},wrong:[]};
  paintQ();
}
function startTest(label,type,ids){
  const ws=idsToWords(ids);
  const qs=buildQuestions(ws,{pool:WORDS,types:['jp2vi','jp2vi','jp2vi','read','read','vi2jp']});
  startSession(qs,{title:label,mode:'test',type});
}
function paintQ(){
  if(sess.idx>=sess.q.length)return sessResult();
  const q=sess.q[sess.idx];sess.answered=false;
  app.innerHTML=`<div class="sessbar"><button class="x" onclick="quitSession()">✕</button>
      <div class="sess-pbar pbar"><i style="width:${sess.idx/sess.q.length*100}%"></i></div>
      <span class="cnt">${sess.idx+1}/${sess.q.length} · ${sess.score}✓</span></div>
    <div class="qbox">
      <div class="qprompt">${q.promptHTML}</div>
      <div class="opts" id="opts">
        ${q.opts.map((o,k)=>`<button class="opt" data-k="${k}" onclick="answer(${k})">
            <span class="k">${'ABCD'[k]}</span><span>${o.t}</span></button>`).join('')}
      </div>
      <div class="qfoot hide" id="qfoot"></div>
    </div>
    ${sess.meta.mode!=='test'?'<div class="mut center" style="margin-top:10px;font-size:12px">Phím <span class="kbd">1-4</span> để chọn · <span class="kbd">Enter</span> để tiếp</div>':''}`;
}
function answer(k){
  if(sess.answered)return;sess.answered=true;
  const q=sess.q[sess.idx];const w=q.w;const correct=q.opts[k].ok;
  if(correct)sess.score++;else sess.wrong.push(w);
  if(typeof w.i==='number')markAnswer(w.i,correct);
  document.querySelectorAll('#opts .opt').forEach((b,i)=>{
    if(q.opts[i].ok)b.classList.add('correct');
    else if(i===k)b.classList.add('wrong');
    else b.classList.add('dim');
    b.onclick=null;
  });
  const foot=document.getElementById('qfoot');foot.classList.remove('hide');
  const expl = q.kind==='jlpt'
    ? `<span class="mut">Đáp án đúng: <b>${esc(w.v)}</b></span>`
    : `<span class="mut">${jp(w,true)} (${esc(w.r)}) = ${esc(w.v)}</span>`;
  foot.innerHTML=`<span class="res ${correct?'ok':'no'}">${correct?'✓ Chính xác':'✗ Sai rồi'}</span>
    ${expl}
    <button class="btn" style="margin-left:auto" onclick="nextQ()">${sess.idx+1>=sess.q.length?'Kết quả':'Tiếp ▶'}</button>`;
}
function nextQ(){sess.idx++;paintQ()}
function quitSession(){if(confirm('Thoát phiên này? Tiến độ trả lời vẫn được lưu.'))go(view==='tests'?'tests':'learn')}
function sessResult(){
  const pct=Math.round(sess.score/sess.q.length*100);
  if(sess.meta.mode==='test'){
    S.tests.unshift({date:Date.now(),type:sess.meta.type,label:sess.meta.title,score:sess.score,total:sess.q.length,pct});
    S.tests=S.tests.slice(0,60);saveTests();
  }
  const emo=pct>=90?'🏆':pct>=75?'🎉':pct>=50?'💪':'📚';
  app.innerHTML=`<div class="card center" style="padding:26px">
     <div style="font-size:48px">${emo}</div>
     <div class="scorebig">${sess.score}<small>/${sess.q.length}</small></div>
     <div class="pbar" style="margin:10px 0"><i style="width:${pct}%"></i></div>
     <div style="font-size:20px;font-weight:700">${pct}%</div>
     <p class="mut">${sess.meta.title||''}</p>
   </div>
   ${sess.wrong.length?`<h3>Từ cần ôn lại (${sess.wrong.length})</h3><div class="card pad0">
     ${sess.wrong.map(w=>`<div class="row"><div><b>${jp(w,true)}</b> <span class="mut">${esc(w.r)}</span></div>
       <div style="margin-left:auto">${esc(w.v)}</div></div>`).join('')}</div>`:''}
   <div class="btnrow" style="margin-top:16px;justify-content:center">
     ${sess.wrong.length?`<button class="btn" onclick='startSession(buildQuestions(${JSON.stringify(sess.wrong.map(w=>w.i))}.map(i=>byId[i]),{}),{title:"Ôn lại từ sai",mode:"quiz"})'>🔁 Ôn lại từ sai</button>`:''}
     <button class="btn sec" onclick="go('${sess.meta.mode==='test'?'tests':'learn'}')">Xong</button>
   </div>`;
}

/* ================= TEST HUB ================= */
function TestHub(){
  const dataUnits=UNITS.filter(u=>unitWords(u.u).length);
  let html=`<h2>Bài test</h2><p class="mut" style="margin-top:-4px">Câu hỏi trắc nghiệm trộn: Nhật→Việt, cách đọc kanji, Việt→Nhật.</p>`;
  // per-unit
  html+=`<h3>📦 Test theo Unit</h3><div class="card pad0">`;
  dataUnits.forEach(u=>{const ws=unitWords(u.u);
    html+=`<div class="row"><div><b>Unit ${String(u.u).padStart(2,'0')}</b> · ${u.name}<div class="mut" style="font-size:13px">${ws.length} câu</div></div>
      <button class="btn" style="margin-left:auto" onclick='startTest("Test Unit ${u.u}","unit",${JSON.stringify(ws.map(w=>w.i))})'>Làm ▶</button></div>`});
  html+='</div>';
  // every 2 units
  html+=`<h3 style="margin-top:16px">📚 Test 2 Unit</h3><div class="card pad0">`;
  for(let a=1;a<=11;a+=2){const b=a+1;const wa=unitWords(a),wb=unitWords(b);
    if(!wa.length)continue;const ids=[...wa,...wb].map(w=>w.i);
    const ready=wa.length&&(b>11||wb.length||true);
    html+=`<div class="row ${wa.length?'':'lock'}"><div><b>Unit ${a}${b<=11?'–'+b:''}</b><div class="mut" style="font-size:13px">${ids.length} câu</div></div>
      <button class="btn" style="margin-left:auto" onclick='startTest("Test Unit ${a}-${b}","2unit",${JSON.stringify(ids)})'>Làm ▶</button></div>`}
  html+='</div>';
  // comprehensive + jlpt
  const allIds=WORDS.map(w=>w.i);
  html+=`<h3 style="margin-top:16px">🎯 Test tổng hợp</h3><div class="card pad0">
     <div class="row"><div><b>Tổng hợp toàn bộ</b><div class="mut" style="font-size:13px">${WORDS.length} từ hiện có · random 60 câu</div></div>
       <button class="btn" style="margin-left:auto" onclick='startSession(buildQuestions(WORDS,{limit:60,types:["jp2vi","jp2vi","read","read","vi2jp"]}),{title:"Test tổng hợp",mode:"test",type:"final"})'>Làm ▶</button></div>
   </div>`;
  // ---- JLPT section ----
  const J=window.JLPT||[];
  if(J.length){
    const mc={};J.forEach(x=>mc[x.m]=(mc[x.m]||0)+1);
    html+=`<h3 style="margin-top:16px">🇯🇵 Đề JLPT N3 thật (文字・語彙)</h3>
     <div class="note" style="margin-bottom:10px">${J.length} câu trích từ đề thi thật bạn gửi — chữ Hán + từ vựng. Đáp án đã được kiểm tra.</div>
     <div class="card pad0">
       <div class="row"><div><b>Mô phỏng đề đầy đủ</b><div class="mut" style="font-size:13px">Trộn cả 5 dạng · ${J.length} câu</div></div>
         <button class="btn" style="margin-left:auto" onclick="startJLPT(0)">Làm ▶</button></div>
       ${[1,2,3,4,5].filter(m=>mc[m]).map(m=>`<div class="row"><div><b>${JLPTLABEL[m].split('·')[0].trim()}</b><div class="mut" style="font-size:13px">${JLPTLABEL[m].split('·')[1].trim()} · ${mc[m]} câu</div></div>
         <button class="btn sec" style="margin-left:auto" onclick="startJLPT(${m})">Làm ▶</button></div>`).join('')}
     </div>`;
  }
  html+=`<div></div>
   <div class="note" style="margin-top:14px">Mỗi lần làm test, điểm sẽ được lưu vào <b>Lịch sử</b> 📊. Cố gắng đạt &ge;75% trước khi sang phần mới nhé!</div>`;
  app.innerHTML=html;
}
function jlptInfo(){toast('Phần đề JLPT đang được mình soạn từ các đề thật bạn gửi.')}

/* ================= HISTORY ================= */
function History(){
  // last 14 days
  const days=[];const d=new Date();
  for(let k=13;k>=0;k--){const dd=new Date(d);dd.setDate(d.getDate()-k);
    const key=dd.getFullYear()+'-'+String(dd.getMonth()+1).padStart(2,'0')+'-'+String(dd.getDate()).padStart(2,'0');
    days.push({key,label:(dd.getMonth()+1)+'/'+dd.getDate(),sec:S.time[key]||0})}
  const max=Math.max(60,...days.map(x=>x.sec));
  const totalSec=Object.values(S.time).reduce((a,b)=>a+b,0);
  let html=`<h2>Lịch sử học</h2>
   <div class="grid g3" style="margin-bottom:14px">
     <div class="stat"><div class="n">${fmtDur(S.time[todayKey()]||0)}</div><div class="l">Hôm nay</div></div>
     <div class="stat"><div class="n">${fmtDur(totalSec)}</div><div class="l">Tổng cộng</div></div>
     <div class="stat"><div class="n">${streak()}🔥</div><div class="l">Chuỗi ngày</div></div>
   </div>
   <div class="card"><b>Số phút học mỗi ngày (14 ngày)</b>
     <div class="chart">
       ${days.map(x=>`<div class="bar"><i style="height:${x.sec/max*120}px" title="${fmtDur(x.sec)}"></i><small>${x.label}</small></div>`).join('')}
     </div>
   </div>`;
  html+=`<h3 style="margin-top:16px">Kết quả các bài test</h3>`;
  if(!S.tests.length)html+=`<div class="note">Chưa có bài test nào. Vào tab <b>Bài test</b> để bắt đầu!</div>`;
  else{html+='<div class="card pad0">';
    S.tests.slice(0,30).forEach(t=>{const dt=new Date(t.date);
      const col=t.pct>=75?'var(--good)':t.pct>=50?'var(--warn)':'var(--bad)';
      html+=`<div class="row"><div><b>${esc(t.label)}</b><div class="mut" style="font-size:12px">${dt.getDate()}/${dt.getMonth()+1} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}</div></div>
        <div style="margin-left:auto;text-align:right"><b style="color:${col}">${t.pct}%</b><div class="mut" style="font-size:12px">${t.score}/${t.total}</div></div></div>`});
    html+='</div>';
    html+=`<div class="btnrow" style="margin-top:12px"><button class="btn ghost" onclick="if(confirm('Xoá toàn bộ lịch sử test?')){S.tests=[];saveTests();go('history')}">🗑 Xoá lịch sử test</button></div>`;
  }
  app.innerHTML=html;
}

/* ================= SETTINGS: mode + furigana ================= */
function applyMode(){
  document.body.classList.remove('mode-phone','mode-desktop');
  if(S.set.mode==='phone')document.body.classList.add('mode-phone');
  if(S.set.mode==='desktop')document.body.classList.add('mode-desktop');
  document.querySelectorAll('#modeSw button').forEach(b=>b.classList.toggle('on',b.dataset.m===S.set.mode));
}
document.querySelectorAll('#modeSw button').forEach(b=>b.onclick=()=>{
  S.set.mode=(S.set.mode===b.dataset.m)?'auto':b.dataset.m;saveSet();applyMode()});
const furiBtn=document.getElementById('furiBtn');
function applyFuri(){furiBtn.style.color=S.set.furigana==='off'?'var(--mut)':'var(--acc)';
  furiBtn.title='Furigana: '+({all:'hiện tất cả',hard:'chỉ từ khó',off:'tắt'}[S.set.furigana])}
furiBtn.onclick=()=>{S.set.furigana={all:'hard',hard:'off',off:'all'}[S.set.furigana];saveSet();applyFuri();
  toast('Furigana: '+({all:'hiện tất cả',hard:'chỉ từ khó',off:'tắt'}[S.set.furigana]));
  if(view==='home')Home();else go(view)};

/* keyboard for quiz on desktop */
document.addEventListener('keydown',e=>{
  if(!sess||view==='history')return;
  if(['1','2','3','4'].includes(e.key)&&!sess.answered)answer(+e.key-1);
  else if(e.key==='Enter'&&sess.answered){const b=document.querySelector('#qfoot .btn');if(b)b.click()}
});

/* ================= PWA ================= */
if('serviceWorker' in navigator){window.addEventListener('load',()=>{
  navigator.serviceWorker.register('sw.js').catch(()=>{});});}

/* ================= INIT ================= */
applyMode();applyFuri();
if(!WORDS.length)app.innerHTML='<div class="note">Chưa tải được dữ liệu từ vựng (data.js).</div>';
else go('home');
</script>
